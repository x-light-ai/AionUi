<!doctype html>
<html data-theme="light" data-color-scheme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- FORK-CUSTOM: 品牌名替换为 XAIWork（与 xaiworkBrand.ts appName 保持一致；静态 HTML 无法 import TS） -->
    <meta name="application-name" content="XAIWork" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- FORK-CUSTOM: 品牌名替换为 XAIWork -->
    <meta name="apple-mobile-web-app-title" content="XAIWork" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4E5969" />
    <!-- FORK-CUSTOM: PWA 图标用 fork 品牌图（上游 pwa/icon-*.png 保持原样） -->
    <link rel="icon" type="image/png" href="./pwa/xaiwork-icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./pwa/xaiwork-icon-180.png" />
    <!-- FORK-CUSTOM: 品牌名替换为 XAIWork -->
    <title>XAIWork</title>
    <script>
      // Synchronously restore theme appearance from localStorage to prevent theme flash
      (function () {
        try {
          var theme = localStorage.getItem('__aionui_theme');
          if (theme) document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      // Set arco-theme on body synchronously
      try {
        var t = localStorage.getItem('__aionui_theme');
        if (t) document.body.setAttribute('arco-theme', t);
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
