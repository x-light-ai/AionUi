# FORK-CUSTOM: XAIWork fork 新增 workflow，不存在于上游，rebase 时无冲突。
# 用途：按 tag 触发，仅构建 Linux x64 的 webui 版（web-cli tarball），
# 并作为 draft release 发布。上游 build-and-release.yml 的自动触发已被 fork 关闭。
name: 'XAIWork Release Web (Linux)'

permissions:
  contents: write

on:
  push:
    tags:
      - '*'

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  build-web-linux:
    name: Build web-cli linux-x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop renderer (static files)
        run: bunx electron-vite build --config packages/desktop/electron.vite.config.ts
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Pack web-cli tarball (linux-x64)
        shell: bash
        run: node scripts/pack-web-cli.js
        env:
          PACK_PLATFORM: linux
          PACK_ARCH: x64
          # aioncore 版本由 repo-root package.json 的 aioncoreVersion pin 决定。
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-cli-linux-x64
          path: |
            dist-web-cli/*.tar.gz
            dist-web-cli/*.sha256
          retention-days: 7

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} (Linux Web)
          files: |
            dist-web-cli/*.tar.gz
            dist-web-cli/*.sha256
          generate_release_notes: true
          draft: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
